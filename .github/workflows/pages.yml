name: Deploy SEO-ready static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SEO-ready site
        run: python tools/generate_seo_site.py

      - name: Apply Google Search Essentials
        run: python tools/apply_search_essentials.py

      - name: Apply homeowner experience enhancements
        run: python tools/apply_site_enhancements.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload public site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
